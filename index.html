function load(){try{const s=localStorage.getItem("wt-tasks-v3");if(s){const parsed=JSON.parse(s);if(parsed.length>0)return parsed;}return SAVED_DATA;}catch{return SAVED_DATA;}}
function save(tasks){try{localStorage.setItem("wt-tasks-v3",JSON.stringify(tasks));}catch{}}

function reducer(state,action){
  let next;
  switch(action.type){
    case"UPDATE":next=state.map(t=>t.id===action.id?{...t,[action.field]:action.value}:t);break;
    case"ADD_TASK":next=[...state,action.task];break;
    case"DELETE_TASK":next=state.filter(t=>t.id!==action.id);break;
    case"ADD_MILESTONE":next=state.map(t=>t.id===action.id?{...t,milestones:[...t.milestones,action.milestone]}:t);break;
    case"UPDATE_MILESTONE":next=state.map(t=>t.id===action.id?{...t,milestones:t.milestones.map(m=>m.id===action.mid?{...m,[action.field]:action.value}:m)}:t);break;
    case"DELETE_MILESTONE":next=state.map(t=>t.id===action.id?{...t,milestones:t.milestones.filter(m=>m.id!==action.mid)}:t);break;
    case"CHECK_IN":next=state.map(t=>t.id===action.id?{...t,lastUpdated:new Date().toLocaleDateString()}:t);break;
    default:return state;
  }
  save(next);
  return next;
}

  const projectTasks=filtered.filter(t=>!t.ongoing);

    const isOngoing=newTask.ongoing===true;

      ongoing:isOngoing,
      id:Date.now(),
      notes:"",
      pinned:false,
      startDate:"",
      dueDate:"",
      progress:0,
      jiraUrl:"",
      confluenceUrl:"",

    setShowAdd(false);
  };

  const [showDigest,setShowDigest]=useState(false);
  const [webhookUrl,setWebhookUrl]=useState(()=>localStorage.getItem("wt-slack-webhook")||"");

  const [slackSent,setSlackSent]=useState(false);
  const [slackError,setSlackError]=useState("");

  const today=new Date();
  const fmt=d=>d?new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"";
  const daysSince=d=>d?Math.round((today-new Date(d))/86400000):999;
  const daysUntil=d=>d?Math.round((new Date(d)-today)/86400000):null;

  const overdueCheckIns=tasks.filter(t=>t.ongoing&&daysSince(t.lastUpdated)>=7);
  const upcomingDue=tasks.filter(t=>!t.ongoing&&t.dueDate&&daysUntil(t.dueDate)!==null&&daysUntil(t.dueDate)<=7&&daysUntil(t.dueDate)>=0);
  const overdueDue=tasks.filter(t=>!t.ongoing&&t.dueDate&&daysUntil(t.dueDate)<0);
  const blocked=tasks.filter(t=>t.status==="Blocked");

  const buildDigest=()=>{
    const lines=[];
    lines.push(`*📋 Work Tracker Digest — ${today.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}*`);
    lines.push("");
    if(overdueCheckIns.length){
      lines.push("*🔄 Ongoing — Check-in Overdue (7+ days)*");
      overdueCheckIns.forEach(t=>lines.push(`• ${t.name} — last checked in: ${t.lastUpdated||"never"}`));
      lines.push("");
    }
    if(overdueDue.length){
      lines.push("*🚨 Overdue Projects*");
      overdueDue.forEach(t=>lines.push(`• ${t.name} — was due ${fmt(t.dueDate)} (${Math.abs(daysUntil(t.dueDate))}d ago)`));
      lines.push("");
    }
    if(upcomingDue.length){
      lines.push("*⏰ Due Within 7 Days*");
      upcomingDue.forEach(t=>lines.push(`• ${t.name} — due ${fmt(t.dueDate)} (${daysUntil(t.dueDate)}d)`));
      lines.push("");
    }
    if(blocked.length){
      lines.push("*🔴 Blocked*");
      blocked.forEach(t=>lines.push(`• ${t.name}`));
      lines.push("");
    }
    lines.push("*📊 Full Status Summary*");
    ["In Progress","Pending","Blocked","On Hold","Complete"].forEach(s=>{
      const count=tasks.filter(t=>t.status===s).length;
      if(count) lines.push(`• ${s}: ${count}`);
    });
    lines.push("");
    lines.push(`_${tasks.filter(t=>t.ongoing).length} ongoing · ${tasks.filter(t=>!t.ongoing).length} projects · ${tasks.filter(t=>t.status==="Complete").length} complete_`);
    return lines.join("\n");
  };

  const saveWebhook=()=>{
    localStorage.setItem("wt-slack-webhook",webhookInput);
    setWebhookUrl(webhookInput);
    setWebhookInput("");
    setShowWebhookSetup(false);
  };

  const sendToSlack=async()=>{
    if(!webhookUrl){setShowWebhookSetup(true);return;}
    setSlackError("");
    try{
      await fetch(webhookUrl,{method:"POST",body:JSON.stringify({text:buildDigest()})});
      setSlackSent(true);
      setTimeout(()=>setSlackSent(false),3000);
    }catch(e){setSlackError("Could not send — check your webhook URL.");}
  };

    <div className="min-h-screen bg-gray-50 text-sm">

          <button onClick={()=>setShowDigest(true)} className="bg-indigo-500 hover:bg-indigo-400 px-3 py-1.5 rounded text-xs font-medium">&#128226; Slack Digest</button>
          <button onClick={()=>{
            const data=localStorage.getItem("wt-tasks-v3")||JSON.stringify(tasks);
            const blob=new Blob([data],{type:"application/json"});
            const url=URL.createObjectURL(blob);
            const a=document.createElement("a");
            a.href=url;a.download="work-tracker-backup-"+new Date().toISOString().slice(0,10)+".json";
            a.click();URL.revokeObjectURL(url);
          }} className="bg-indigo-500 hover:bg-indigo-400 px-3 py-1.5 rounded text-xs font-medium">&#128229; Export</button>
          <button onClick={()=>setShowAdd(true)} className="bg-white text-indigo-700 hover:bg-indigo-50 px-3 py-1.5 rounded text-xs font-bold">+ Add</button>
        </div>
      </div>

      {/* Filters */}
      <div className="px-6 py-3 bg-white border-b flex flex-wrap gap-3 items-center">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search..." className="border rounded px-3 py-1.5 text-sm w-40 focus:outline-none focus:ring-2 focus:ring-indigo-300"/>

              <select value={newTask.priority} onChange={e=>setNewTask({...newTask,priority:e.target.value})} className="flex-1 border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
                {["High","Medium","Low"].map(p=><option key={p}>{p}</option>)}
              </select>
            </div>
            {/* Type toggle */}
            <div className="flex rounded-lg border overflow-hidden mb-3">
              <button type="button" onClick={()=>setNewTask(prev=>({...prev,ongoing:false}))}
                style={{flex:1,padding:"8px",fontSize:"13px",fontWeight:600,border:"none",cursor:"pointer",background:newTask.ongoing===false?"#4f46e5":"#fff",color:newTask.ongoing===false?"#fff":"#4b5563"}}>
                Project
              </button>
              <button type="button" onClick={()=>setNewTask(prev=>({...prev,ongoing:true}))}
                style={{flex:1,padding:"8px",fontSize:"13px",fontWeight:600,border:"none",cursor:"pointer",background:newTask.ongoing===true?"#0d9488":"#fff",color:newTask.ongoing===true?"#fff":"#4b5563"}}>
                Ongoing
              </button>
            </div>
            {newTask.ongoing===true&&(
              <select value={newTask.recurrence} onChange={e=>setNewTask({...newTask,recurrence:e.target.value})} className="w-full border rounded px-3 py-2 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-teal-300">
                {RECURRENCE.map(r=><option key={r}>{r}</option>)}
              </select>
            )}
            <div style={{display:"flex",gap:"8px",justifyContent:"flex-end",marginTop:"12px"}}>
              <button type="button" onClick={()=>setShowAdd(false)}
                style={{padding:"8px 16px",fontSize:"13px",border:"1px solid #d1d5db",borderRadius:"6px",background:"#fff",cursor:"pointer"}}>
                Cancel
              </button>
              <button type="button" onClick={addTask}
                style={{padding:"8px 16px",fontSize:"13px",fontWeight:600,border:"none",borderRadius:"6px",cursor:"pointer",background:newTask.ongoing===true?"#0d9488":"#4f46e5",color:"#fff"}}>
                {newTask.ongoing===true?"Add Ongoing":"Add Project"}
              </button>
            </div>
          </div>
        </div>
      )}

      {detailTask&&<DetailPanel task={detailTask} dispatch={dispatch} onClose={()=>setDetailId(null)}/>}

      {/* Slack Digest Modal */}
      {showDigest&&(
        <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-screen overflow-y-auto">
            <div className="px-6 py-4 border-b flex items-center justify-between">
              <div>
                <h2 className="font-bold text-base">📣 Slack Digest</h2>
                <p className="text-xs text-gray-400 mt-0.5">Send your daily/weekly summary to Slack</p>
              </div>
              <button onClick={()=>{setShowDigest(false);setSlackError("");}} className="text-gray-400 hover:text-gray-700 text-xl font-bold">✕</button>
            </div>
            <div className="px-6 py-4 space-y-4">
              {/* Alert badges */}
              <div className="flex flex-wrap gap-2">
                {overdueCheckIns.length>0&&<span className="bg-orange-100 text-orange-700 text-xs px-3 py-1 rounded-full font-medium">🔄 {overdueCheckIns.length} check-in{overdueCheckIns.length>1?"s":""} overdue</span>}
                {overdueDue.length>0&&<span className="bg-red-100 text-red-700 text-xs px-3 py-1 rounded-full font-medium">🚨 {overdueDue.length} project{overdueDue.length>1?"s":""} overdue</span>}
                {upcomingDue.length>0&&<span className="bg-yellow-100 text-yellow-700 text-xs px-3 py-1 rounded-full font-medium">⏰ {upcomingDue.length} due soon</span>}
                {blocked.length>0&&<span className="bg-red-100 text-red-700 text-xs px-3 py-1 rounded-full font-medium">🔴 {blocked.length} blocked</span>}
                {overdueCheckIns.length===0&&overdueDue.length===0&&upcomingDue.length===0&&blocked.length===0&&<span className="bg-green-100 text-green-700 text-xs px-3 py-1 rounded-full font-medium">✅ All clear!</span>}
              </div>

              {/* Preview */}
              <div>
                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider block mb-2">Message Preview</label>
                <pre className="bg-gray-50 border rounded-xl px-4 py-3 text-xs text-gray-700 whitespace-pre-wrap font-mono leading-relaxed max-h-64 overflow-y-auto">{buildDigest()}</pre>
              </div>

              {/* Webhook setup */}
              {showWebhookSetup?(
                <div className="bg-indigo-50 rounded-xl p-4 space-y-3">
                  <p className="text-xs font-semibold text-indigo-800">Set up Slack Webhook</p>
                  <ol className="text-xs text-indigo-700 space-y-1 list-decimal list-inside">
                    <li>Go to <a href="https://api.slack.com/apps" target="_blank" rel="noreferrer" className="underline font-medium">api.slack.com/apps</a> → Create New App → From Scratch</li>
                    <li>Add feature: <strong>Incoming Webhooks</strong> → Activate</li>
                    <li>Click "Add New Webhook to Workspace" → pick a channel (your DMs work!)</li>
                    <li>Copy the webhook URL and paste below</li>
                  </ol>
                  <input value={webhookInput} onChange={e=>setWebhookInput(e.target.value)} placeholder="https://hooks.slack.com/services/..." className="w-full border rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
                  <div className="flex gap-2">
                    <button onClick={saveWebhook} disabled={!webhookInput} className="bg-indigo-600 text-white text-xs px-4 py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-40 font-medium">Save Webhook</button>
                    <button onClick={()=>setShowWebhookSetup(false)} className="text-xs border px-4 py-2 rounded-lg hover:bg-gray-50">Cancel</button>
                  </div>
                </div>
              ):(
                <div className="flex items-center gap-2">
                  {webhookUrl&&<p className="text-xs text-green-600 font-medium flex-1">✓ Webhook configured</p>}
                  {!webhookUrl&&<p className="text-xs text-gray-400 flex-1">No webhook set — send manually or configure below</p>}
                  <button onClick={()=>setShowWebhookSetup(true)} className="text-xs text-indigo-500 hover:text-indigo-700 underline shrink-0">{webhookUrl?"Change webhook":"Set up webhook"}</button>
                </div>
              )}

              {slackError&&<p className="text-xs text-red-500 font-medium">{slackError}</p>}

              {/* Action buttons */}
              <div className="flex gap-2 pt-1">
                <button onClick={sendToSlack} className={`flex-1 py-2.5 rounded-xl text-sm font-bold text-white transition-colors ${slackSent?"bg-green-500":"bg-indigo-600 hover:bg-indigo-700"}`}>
                  {slackSent?"✓ Sent to Slack!":"Send to Slack"}
                </button>
                <button onClick={()=>{navigator.clipboard.writeText(buildDigest());}} className="flex-1 py-2.5 rounded-xl text-sm font-medium border hover:bg-gray-50">

                </button>
              </div>
              <p className="text-xs text-gray-400 text-center">Tip: bookmark the tracker and open it each morning as your standup prep</p>
            </div>
          </div>
        </div>
      )}

      <div className="p-6 space-y-10">

        {/* ONGOING SECTION */}
        {ongoingTasks.length>0&&(filterType==="All"||filterType==="Ongoing")&&(
          <div>
            <div className="flex items-center gap-3 mb-4">
              <h2 className="text-sm font-bold text-teal-700 uppercase tracking-widest flex items-center gap-2">
                🔄 Ongoing Operations
              </h2>
              <span className="bg-teal-100 text-teal-700 px-2 py-0.5 rounded-full text-xs font-medium">{ongoingTasks.length} active</span>
            </div>
            {view==="board"?(
              <div className="grid gap-3 grid-cols-1 md:grid-cols-2 lg:grid-cols-4">
                {ongoingTasks.map(t=><OngoingCard key={t.id} task={t} dispatch={dispatch} onOpen={()=>setDetailId(t.id)}/>)}
              </div>
            ):(
              <OngoingTable tasks={ongoingTasks} dispatch={dispatch} onOpen={setDetailId}/>
            )}
          </div>
        )}

        {/* PROJECTS SECTION */}
        {projectTasks.length>0&&(filterType==="All"||filterType==="Project")&&(
          <div>
            <div className="flex items-center gap-3 mb-4">
              <h2 className="text-sm font-bold text-indigo-700 uppercase tracking-widest">📋 Projects</h2>
              <span className="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full text-xs font-medium">{projectTasks.length} active</span>
            </div>
            {view==="board"?(
              <div className="space-y-8">
                {CATEGORIES.map(cat=>{
                  const ct=grouped[cat];
                  if(!ct.length)return null;
                  return(
                    <div key={cat}>
                      <h3 className="text-xs font-bold uppercase tracking-widest text-gray-400 mb-3 flex items-center gap-2">
                        {cat}<span className="bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded-full text-xs">{ct.length}</span>
                      </h3>
                      <div className="grid gap-3 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
                        {ct.map(t=><ProjectCard key={t.id} task={t} dispatch={dispatch} onOpen={()=>setDetailId(t.id)}/>)}
                      </div>
                    </div>
                  );
                })}
              </div>
            ):(
              <ProjectTable tasks={projectTasks} dispatch={dispatch} onOpen={setDetailId}/>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Ongoing Card ── */

  const statusDot={"In Progress":"bg-teal-400","Pending":"bg-yellow-400","Blocked":"bg-red-400","On Hold":"bg-gray-400","Complete":"bg-green-400"};

    <div onClick={onOpen} className="bg-white rounded-xl border-2 border-teal-100 shadow-sm hover:shadow-md hover:border-teal-300 transition-all cursor-pointer group">

        <div className="flex items-start justify-between gap-2 mb-3">
          <p className="font-semibold text-gray-800 text-sm leading-snug flex-1 group-hover:text-teal-700 transition-colors">{t.name}</p>

/* ── Detail Panel ── */
function DetailPanel({task:t,dispatch,onClose}){
  const STATUS_COLORS={"In Progress":"bg-blue-100 text-blue-800","Pending":"bg-yellow-100 text-yellow-800","Blocked":"bg-red-100 text-red-800","Complete":"bg-green-100 text-green-800","On Hold":"bg-gray-100 text-gray-700"};
  const STATUS_BAR={"In Progress":"bg-blue-400","Pending":"bg-yellow-400","Blocked":"bg-red-400","Complete":"bg-green-400","On Hold":"bg-gray-400"};
  const [newMs,setNewMs]=useState("");
  const [newMsDate,setNewMsDate]=useState("");
  const up=(field,value)=>dispatch({type:"UPDATE",id:t.id,field,value});
  const addMilestone=()=>{
    if(!newMs.trim())return;
    dispatch({type:"ADD_MILESTONE",id:t.id,milestone:{id:Date.now(),label:newMs,date:newMsDate,done:false}});
    setNewMs("");setNewMsDate("");
  };
  const daysRemaining=t.dueDate?Math.round((new Date(t.dueDate)-new Date())/86400000):null;
  const totalDays=(t.startDate&&t.dueDate)?Math.round((new Date(t.dueDate)-new Date(t.startDate))/86400000):null;

  return(
    <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-end" onClick={onClose}>
      <div className="bg-white w-full max-w-2xl h-full overflow-y-auto shadow-2xl" onClick={e=>e.stopPropagation()}>
        <div className={`h-2 w-full ${t.ongoing?"bg-teal-400":STATUS_BAR[t.status]}`}/>
        <div className="px-6 py-5 border-b flex items-start justify-between gap-4">
          <div className="flex-1">
            <div className="flex items-center gap-2 mb-1">
              <p className="text-xs text-gray-400 uppercase tracking-wider">{t.category}</p>
              {t.ongoing&&<span className="text-xs bg-teal-100 text-teal-700 px-2 py-0.5 rounded-full font-medium">🔄 Ongoing</span>}
            </div>
            <h2 className="text-lg font-bold text-gray-900 leading-tight">{t.name}</h2>
          </div>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-700 text-xl font-bold mt-1">✕</button>
        </div>

        <div className="px-6 py-5 space-y-6">
          {/* Status / Priority row */}
          <div className={`grid gap-3 ${t.ongoing?"grid-cols-3":"grid-cols-3"}`}>
            <div>
              <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider block mb-1">Status</label>
              <select value={t.status} onChange={e=>up("status",e.target.value)} className={`w-full rounded-lg px-3 py-2 text-sm font-medium border-0 cursor-pointer ${STATUS_COLORS[t.status]}`}>
                {(t.ongoing?["In Progress","Pending","Blocked","On Hold"]:STATUS_OPTIONS).map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div>
              <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider block mb-1">Priority</label>
              <select value={t.priority} onChange={e=>up("priority",e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
                {["High","Medium","Low"].map(p=><option key={p}>{p}</option>)}
              </select>
            </div>
            {t.ongoing?(
              <div>
                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider block mb-1">Recurrence</label>
                <select value={t.recurrence||"Weekly"} onChange={e=>up("recurrence",e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-300">
                  {RECURRENCE.map(r=><option key={r}>{r}</option>)}
                </select>
              </div>
            ):(
              <div>
                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider block mb-1">Progress</label>
                <div className="flex items-center gap-2 mt-1">
                  <input type="range" min="0" max="100" value={t.progress} onChange={e=>up("progress",Number(e.target.value))} className="flex-1"/>
                  <span className="text-sm font-bold text-gray-600 w-10 text-right">{t.progress}%</span>
                </div>
              </div>
            )}
          </div>

          {/* Check-in (ongoing only) */}
          {t.ongoing&&(
            <div className="bg-teal-50 rounded-xl p-4 flex items-center justify-between">
              <div>
                <p className="text-sm font-semibold text-teal-800">Check-in</p>
                <p className="text-xs text-teal-600 mt-0.5">{t.lastUpdated?"Last checked in: "+t.lastUpdated:"No check-ins recorded yet"}</p>
              </div>
              <button onClick={()=>dispatch({type:"CHECK_IN",id:t.id})} className="bg-teal-600 hover:bg-teal-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
                ✓ Check In Now
              </button>
            </div>
          )}

          {/* Timeline (projects only) */}
          {!t.ongoing&&(
            <div>
              <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider block mb-2">Timeline</label>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="text-xs text-gray-400 mb-1 block">Start Date</label>
                  <input type="date" value={t.startDate} onChange={e=>up("startDate",e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
                </div>
                <div>
                  <label className="text-xs text-gray-400 mb-1 block">Due Date</label>
                  <input type="date" value={t.dueDate} onChange={e=>up("dueDate",e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
                </div>
              </div>
              {t.dueDate&&(
                <div className={`mt-2 rounded-lg px-3 py-2 text-xs font-medium ${daysRemaining<0?"bg-red-50 text-red-700":daysRemaining<=7?"bg-orange-50 text-orange-700":"bg-indigo-50 text-indigo-700"}`}>
                  📅 {totalDays!=null?`${totalDays}-day window · `:""}{daysRemaining<0?`${Math.abs(daysRemaining)} days overdue`:daysRemaining===0?"Due today":`${daysRemaining} days remaining`}
                </div>
              )}
            </div>
          )}

          {/* Milestones */}
          <div>
            <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider block mb-2">{t.ongoing?"Recurring Tasks / Checklist":"Milestones"}</label>
            <div className="space-y-2 mb-3">
              {t.milestones.length===0&&<p className="text-xs text-gray-300 italic">{t.ongoing?"Add recurring checklist items...":"No milestones yet — add key checkpoints below."}</p>}
              {t.milestones.map(m=>(
                <div key={m.id} className="flex items-center gap-2 bg-gray-50 rounded-lg px-3 py-2 group">
                  <input type="checkbox" checked={m.done} onChange={e=>dispatch({type:"UPDATE_MILESTONE",id:t.id,mid:m.id,field:"done",value:e.target.checked})} className="w-4 h-4 shrink-0"/>
                  <span className={`flex-1 text-sm ${m.done?"line-through text-gray-300":"text-gray-700"}`}>{m.label}</span>
                  {m.date&&<span className="text-xs text-gray-400">{m.date}</span>}
                  <button onClick={()=>dispatch({type:"DELETE_MILESTONE",id:t.id,mid:m.id})} className="text-gray-200 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity font-bold text-sm">✕</button>
                </div>
              ))}
            </div>
            <div className="flex gap-2">
              <input value={newMs} onChange={e=>setNewMs(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addMilestone()} placeholder={t.ongoing?"Add checklist item...":"New milestone..."} className="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
              {!t.ongoing&&<input type="date" value={newMsDate} onChange={e=>setNewMsDate(e.target.value)} className="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 w-36"/>}
              <button onClick={addMilestone} className={`text-white px-3 py-2 rounded-lg text-sm font-medium ${t.ongoing?"bg-teal-600 hover:bg-teal-700":"bg-indigo-600 hover:bg-indigo-700"}`}>+</button>
            </div>
          </div>

          {/* Links */}
          <div>
            <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider block mb-2">Links</label>
            <div className="space-y-2">
              <div className="flex items-center gap-2">
                <span className="text-blue-500 text-xs font-bold w-24 shrink-0">🔗 Jira</span>
                <input value={t.jiraUrl} onChange={e=>up("jiraUrl",e.target.value)} placeholder="Paste Jira ticket URL..." className="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
                {t.jiraUrl&&<a href={t.jiraUrl} target="_blank" rel="noreferrer" className="text-blue-500 hover:text-blue-700 text-xs font-medium shrink-0">Open ↗</a>}
              </div>
              <div className="flex items-center gap-2">
                <span className="text-purple-500 text-xs font-bold w-24 shrink-0">📄 Confluence</span>
                <input value={t.confluenceUrl} onChange={e=>up("confluenceUrl",e.target.value)} placeholder="Paste Confluence page URL..." className="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
                {t.confluenceUrl&&<a href={t.confluenceUrl} target="_blank" rel="noreferrer" className="text-purple-500 hover:text-purple-700 text-xs font-medium shrink-0">Open ↗</a>}
              </div>
            </div>
          </div>

          {/* Notes */}
          <div>
            <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider block mb-2">Notes & Updates</label>
            <textarea value={t.notes} onChange={e=>up("notes",e.target.value)} rows={5} placeholder="Jot down notes from impromptu meetings, blockers, context, next steps..." className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none"/>
          </div>

          <div className="pt-2 border-t">
            <button onClick={()=>{dispatch({type:"DELETE_TASK",id:t.id});onClose();}} className="text-xs text-red-400 hover:text-red-600 font-medium">Remove this item</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
